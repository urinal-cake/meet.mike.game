<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propose New Meeting Time</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f766e 0%, #155e75 100%);
            min-height: 100vh;
            padding: 2rem 0;
        }
        .reschedule-container {
            max-width: 860px;
            margin: 0 auto;
        }
        .reschedule-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 2rem;
        }
        .section-card {
            margin-bottom: 1.25rem;
            padding: 1rem 1.25rem;
            background: #f8fafc;
            border-radius: 8px;
            border-left: 4px solid #0d9488;
        }
        .loading-spinner {
            text-align: center;
            padding: 3rem;
        }
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .slot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 0.6rem;
        }
        .slot-btn {
            border: 1px solid #cbd5e1;
            background: #fff;
            color: #0f172a;
            border-radius: 8px;
            padding: 0.5rem;
            font-weight: 600;
        }
        .slot-btn:hover {
            border-color: #0d9488;
            color: #0f766e;
        }
        .slot-btn.selected {
            background: #0d9488;
            color: white;
            border-color: #0d9488;
        }
        .slot-btn.unavailable {
            background: #f1f5f9;
            color: #94a3b8;
            border-color: #e2e8f0;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="reschedule-container">
        <div class="reschedule-card">
            <div id="loadingState" class="loading-spinner">
                <div class="spinner-border text-info" role="status"></div>
                <p class="mt-3">Loading booking details...</p>
            </div>

            <div id="errorState" style="display: none;">
                <div class="error-message">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    <span id="errorMessage"></span>
                </div>
                <a href="/" class="btn btn-primary">Return Home</a>
            </div>

            <div id="rescheduleDetails" style="display: none;">
                <h2 class="mb-3"><i class="fas fa-calendar-days me-2"></i>Propose a New Time</h2>

                <div class="section-card">
                    <div><strong id="meetingType"></strong> (<span id="duration"></span> min)</div>
                    <div class="mt-1"><i class="fas fa-user me-2"></i><span id="name"></span></div>
                    <div class="mt-1"><i class="fas fa-envelope me-2"></i><span id="email"></span></div>
                </div>

                <div class="section-card">
                    <div><strong>Current Time</strong></div>
                    <div class="mt-1"><i class="fas fa-calendar me-2"></i><span id="currentDate"></span></div>
                    <div class="mt-1"><i class="fas fa-clock me-2"></i><span id="currentTime"></span> <span class="text-muted" id="timezone"></span></div>
                </div>

                <div class="section-card">
                    <div class="row g-2 align-items-end">
                        <div class="col-md-5">
                            <label for="newDate" class="form-label"><strong>Select Date</strong></label>
                            <input type="date" id="newDate" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <button id="checkAvailabilityBtn" class="btn btn-outline-info w-100">
                                <i class="fas fa-search me-2"></i>Check Availability
                            </button>
                        </div>
                    </div>
                    <div class="mt-3" id="slotsContainer" style="display:none;">
                        <div class="mb-2"><strong>Available Times</strong></div>
                        <div class="slot-grid" id="slotsGrid"></div>
                        <small class="text-muted d-block mt-2">Select a time, then submit your proposal.</small>
                    </div>
                </div>

                <div id="responseMessage" style="display:none;"></div>

                <div class="d-flex gap-2">
                    <button id="proposeBtn" class="btn btn-info btn-lg" disabled>
                        <i class="fas fa-paper-plane me-2"></i>Propose New Time
                    </button>
                    <a href="/" class="btn btn-secondary btn-lg">Keep Current Time</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        let bookingData = null;
        let selectedTime = null;

        if (!token) {
            showError('No reschedule token provided. Please use the link from your confirmation email.');
        } else {
            loadBooking();
        }

        async function loadBooking() {
            try {
                const response = await fetch(`/api/booking?token=${encodeURIComponent(token)}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to load booking');
                }

                bookingData = data;
                displayBooking(data);
            } catch (error) {
                showError(error.message);
            }
        }

        function displayBooking(booking) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('rescheduleDetails').style.display = 'block';

            document.getElementById('meetingType').textContent = booking.meetingTypeTitle;
            document.getElementById('duration').textContent = booking.durationMinutes;
            document.getElementById('name').textContent = booking.name;
            document.getElementById('email').textContent = booking.email;
            document.getElementById('currentDate').textContent = formatDate(booking.date);
            document.getElementById('currentTime').textContent = booking.time;
            document.getElementById('timezone').textContent = `(${booking.timezone})`;
            document.getElementById('newDate').value = booking.date;

            document.getElementById('checkAvailabilityBtn').addEventListener('click', checkAvailability);
            document.getElementById('proposeBtn').addEventListener('click', submitReschedule);
        }

        async function checkAvailability() {
            const date = document.getElementById('newDate').value;
            if (!date) {
                showResponseError('Please select a date first.');
                return;
            }

            selectedTime = null;
            document.getElementById('proposeBtn').disabled = true;

            const button = document.getElementById('checkAvailabilityBtn');
            button.disabled = true;
            button.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Checking...';

            try {
                const response = await fetch(`/api/availability?date=${encodeURIComponent(date)}&meeting_type=${encodeURIComponent(bookingData.meetingTypeId)}&exclude_token=${encodeURIComponent(token)}`);
                const slots = await response.json();

                if (!response.ok) {
                    throw new Error(slots.error || 'Failed to load availability');
                }

                renderSlots(slots);
            } catch (error) {
                showResponseError(error.message);
            } finally {
                button.disabled = false;
                button.innerHTML = '<i class="fas fa-search me-2"></i>Check Availability';
            }
        }

        function renderSlots(slots) {
            const container = document.getElementById('slotsContainer');
            const grid = document.getElementById('slotsGrid');
            grid.innerHTML = '';

            slots.forEach(slot => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = `slot-btn ${slot.available ? '' : 'unavailable'}`;
                btn.textContent = slot.time;

                if (slot.available) {
                    btn.addEventListener('click', () => {
                        Array.from(grid.querySelectorAll('.slot-btn.selected')).forEach(el => el.classList.remove('selected'));
                        btn.classList.add('selected');
                        selectedTime = slot.time;
                        document.getElementById('proposeBtn').disabled = false;
                    });
                } else {
                    btn.disabled = true;
                }

                grid.appendChild(btn);
            });

            container.style.display = 'block';
        }

        async function submitReschedule() {
            const date = document.getElementById('newDate').value;
            if (!date || !selectedTime) {
                showResponseError('Please choose a date and available time first.');
                return;
            }

            if (!confirm(`Propose moving this meeting to ${formatDate(date)} at ${selectedTime}?`)) {
                return;
            }

            const proposeBtn = document.getElementById('proposeBtn');
            proposeBtn.disabled = true;
            proposeBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Submitting...';

            try {
                const response = await fetch('/api/reschedule', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, date, time: selectedTime })
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to reschedule meeting');
                }

                showSuccess('Proposal sent. The meeting time will only change after someone clicks Accept New Time from the email.');
                proposeBtn.disabled = true;
                proposeBtn.innerHTML = '<i class="fas fa-check me-2"></i>Proposal Sent';
            } catch (error) {
                showResponseError(error.message);
                proposeBtn.disabled = false;
                proposeBtn.innerHTML = '<i class="fas fa-paper-plane me-2"></i>Propose New Time';
            }
        }

        function formatDate(dateStr) {
            const [year, month, day] = dateStr.split('-').map(Number);
            const date = new Date(year, month - 1, day);
            return date.toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        function showError(message) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('errorState').style.display = 'block';
            document.getElementById('errorMessage').textContent = message;
        }

        function showResponseError(message) {
            const responseMessage = document.getElementById('responseMessage');
            responseMessage.className = 'error-message';
            responseMessage.innerHTML = `<i class="fas fa-exclamation-triangle me-2"></i>${message}`;
            responseMessage.style.display = 'block';
        }

        function showSuccess(message) {
            const responseMessage = document.getElementById('responseMessage');
            responseMessage.className = 'success-message';
            responseMessage.innerHTML = `<i class="fas fa-check-circle me-2"></i>${message}`;
            responseMessage.style.display = 'block';
        }
    </script>
</body>
</html>
